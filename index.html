<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="edman panel.html">
    <link rel="stylesheet" href="login.html">
    <link rel="stylesheet" href="seller.html">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP INDEX STORE PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial;}
body{display:flex;min-height:100vh;background:radial-gradient(circle at top,#0b1220,#050816);color:#fff;}

/* SIDEBAR */
.sidebar{
width:270px;
background:rgba(17,24,39,0.9);
backdrop-filter:blur(10px);
padding:15px;
border-right:1px solid rgba(34,211,238,0.2);
position:sticky;top:0;height:100vh;
}
.brand{color:#22d3ee;font-size:20px;font-weight:700;margin-bottom:15px;}
.sidebar a{
display:block;
padding:10px;
margin:6px 0;
background:#111827;
color:#cbd5e1;
border-radius:8px;
text-decoration:none;
cursor:pointer;
transition:0.3s;
}
.sidebar a:hover{background:#22d3ee;color:#000;transform:translateX(5px);}

/* MAIN */
.main{flex:1;overflow:auto;}
.topbar{padding:15px;display:flex;justify-content:space-between;align-items:center;background:rgba(15,23,42,0.8);}

.section{display:none;padding:15px;}
.active{display:block;}

/* SLIDER */
.slider{width:100%;height:260px;border-radius:14px;overflow:hidden;margin-bottom:15px;position:relative;}
.slide{position:absolute;width:100%;height:100%;opacity:0;transition:1s;}
.slide img{width:100%;height:100%;object-fit:cover;}

/* PRODUCTS */
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
.card{background:#111827;padding:10px;border-radius:12px;transition:0.3s;}
.card:hover{transform:scale(1.04);}
.card img{width:100%;height:120px;object-fit:cover;border-radius:8px;}
.btn{padding:7px 10px;border:none;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer;font-weight:600;}

/* PAYMENT MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;}
.modal-box{background:#111827;padding:20px;border-radius:12px;width:320px;}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;background:#0f172a;color:#fff;}

</style>
</head>
<body>

<div class="sidebar">
<div class="brand">⚡ Usman Digital Store</div>
<a href="login.html">🔐 Login</a>
<a onclick="show('products')">🛍 Products</a>
<a href="edman panel.html">🔐 Admin</a>
<a href="seller.html">🔐 sellar</a>
</div>

<div class="main">

<div class="topbar">
<h3>VIP INDEX ECOMMERCE</h3>
</div>

<!-- HOME -->
<div id="home" class="section active">

<div class="slider">
<div class="slide"><img src="https://picsum.photos/1200/500?1"></div>
<div class="slide"><img src="https://picsum.photos/1200/500?2"></div>
<div class="slide"><img src="https://picsum.photos/1200/500?3"></div>
</div>

<h3>🔥 Featured Products</h3>
<div class="products" id="homeGrid"></div>
</div>

<!-- PRODUCTS -->
<div id="products" class="section">
<h3>🛍 All Products (120+)</h3>
<div class="products" id="allGrid"></div>
</div>

</div>

<!-- PAYMENT MODAL -->
<div class="modal" id="pay">
  <div class="modal-box">

    <h3>Payment / Checkout</h3>
    <p id="pname"></p>

    <!-- CUSTOMER INFO -->
    <input placeholder="Full Name">
    <input placeholder="Phone Number">
    <input placeholder="Email">

    <!-- ADDRESS -->
    <input placeholder="Complete Address (House, Street, City)">
    <input placeholder="Area / Nearby Landmark">

    <!-- PAYMENT METHOD -->
    <select>
      <option>EasyPaisa</option>
      <option>JazzCash</option>
      <option>Debit / ATM Card</option>
    </select>

    <!-- CARD / DEBIT DETAILS -->
    <input placeholder="Card / Account Number">
    <input placeholder="PIN / CVV">

    <!-- PID (Order ID / Payment ID) -->
    <input placeholder="PID (Auto Order ID or Reference Code)">

    <button class="btn" onclick="payDone()">Confirm Payment</button>
    <button class="btn" style="background:red;margin-top:5px;" onclick="closePay()">Close</button>

  </div>
</div>
</div>

<script>

let slides=document.querySelectorAll('.slide');
let i=0;
function slider(){slides.forEach(s=>s.style.opacity=0);slides[i].style.opacity=1;i=(i+1)%slides.length;}
setInterval(slider,2500);slider();

function show(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

let current="";

function openPay(name){current=name;document.getElementById('pname').innerText=name;document.getElementById('pay').style.display='flex';}
function closePay(){document.getElementById('pay').style.display='none';}
function payDone(){alert(current+" Payment Sent ✔ Demo Mode");closePay();}

function makeGrid(id,count){let g=document.getElementById(id);
for(let i=1;i<=count;i++){
let d=document.createElement('div');
d.className='card';
d.innerHTML=`<img src="https://picsum.photos/200?random=${i}"><h4>Product ${i}</h4><p>$${(Math.random()*200).toFixed(2)}</p><button class='btn' onclick="openPay('Product ${i}')">Buy Now</button>`;
g.appendChild(d);
}}

makeGrid('homeGrid',20);
makeGrid('allGrid',120);

</script>

</body>
</html>
